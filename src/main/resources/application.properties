spring.application.name=SupplyChainX
spring.datasource.url=jdbc:mysql://localhost:3306/supply_chain_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&autoReconnect=true
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true

# Configuration HikariCP pour éviter les timeouts
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.leak-detection-threshold=60000

server.port=8080

# Configuration GraphQL
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql
spring.graphql.http.path=/graphql

# Logs de debug
logging.level.com.supplychainx=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
